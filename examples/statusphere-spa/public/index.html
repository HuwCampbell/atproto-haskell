<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Statusphere</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
  <div id="elm-root"></div>

  <script src="/public/elm.js"></script>
  <script>
    if (typeof Elm !== 'undefined') {
      Elm.Main.init({ node: document.getElementById('elm-root') });
    } else {
      // Fallback: minimal vanilla JS for when Elm isn't compiled
      document.getElementById('elm-root').innerHTML = `
        <div id="root">
          <div id="header">
            <h1>Statusphere</h1>
            <p>Set your status on the Atmosphere.</p>
          </div>
          <div class="container">
            <div class="card">
              <p>Elm frontend not compiled. Run <code>cd frontend && elm make src/Main.elm --output=../public/elm.js</code></p>
              <p>Or use the API directly:</p>
              <ul>
                <li><a href="/xrpc/xyz.statusphere.getStatuses">GET /xrpc/xyz.statusphere.getStatuses</a></li>
              </ul>
            </div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
